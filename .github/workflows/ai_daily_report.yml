name: AI日报自动发送

on:
  # 定时触发 - 每天北京时间8:00 = UTC 0:00
  schedule:
    - cron: '0 0 * * *'
  
  # 允许手动触发
  workflow_dispatch:

# 并发控制
concurrency:
  group: ai-daily-report
  cancel-in-progress: false

jobs:
  send_ai_daily_report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          cd ai_daily_report
          pip install -r requirements.txt
      
      - name: 运行AI日报生成
        id: run_report
        run: |
          cd ai_daily_report
          python main.py --run-now
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
      
      - name: 保存报告存档
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-report-${{ github.run_number }}
          path: ai_daily_report/reports/
          retention-days: 30
      
      - name: 发送失败告警
        if: failure()
        run: |
          echo "AI日报发送失败，请检查日志"
